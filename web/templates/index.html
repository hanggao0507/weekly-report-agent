<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.app.title }}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Weekly Report Agent</p>
        <h1>每周五自动生成团队工作周报</h1>
        <p class="lede">默认基于 GitHub Mock 与飞书 Mock 数据，支持立即生成、结果下载和历史运行记录。</p>
      </div>
      <div class="hero-card">
        <div class="card-row">
          <span>调度规则</span>
          <strong>{{ settings.schedule.cron }}</strong>
        </div>
        <div class="card-row">
          <span>时区</span>
          <strong>{{ settings.schedule.timezone }}</strong>
        </div>
        <div class="card-row">
          <span>下次运行</span>
          <strong>{{ next_run_time or "等待调度器初始化" }}</strong>
        </div>
      </div>
    </section>

    <section class="action-panel">
      <div>
        <h2>立即生成</h2>
        <p>手动触发一次完整周报生成流程。</p>
      </div>
      <div class="actions">
        <button
          id="generate-button"
          class="primary-button"
          hx-post="/reports/generate"
          hx-target="#action-result"
          hx-swap="innerHTML"
          hx-disabled-elt="this"
        >
          <span class="button-label">立即生成</span>
        </button>
      </div>
    </section>

    <div id="action-result"></div>

    <div
      id="home-status-content"
      hx-get="/partials/home-status"
      hx-trigger="load, every 3s"
      hx-swap="innerHTML"
    >
      {% include "partials/home_status.html" %}
    </div>
  </main>
</body>
</html>
